name: README Skills Check

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'README.md'
      - 'scripts/check_readme_skills.py'

jobs:
  check:
    name: Validate README skills table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README skills table is in sync
        run: python3 scripts/check_readme_skills.py
