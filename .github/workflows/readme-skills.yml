name: README Skills Check

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'README.md'
      - 'scripts/check_readme_skills.py'
      - 'scripts/generate_catalogue.py'
      - 'skills.json'
      - 'packs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    name: Validate README skills table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check generated catalogue, packs, and README table
        run: python3 scripts/generate_catalogue.py --check
